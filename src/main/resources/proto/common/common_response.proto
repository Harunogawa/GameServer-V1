syntax = "proto3";

package com.unityonline.gameserver.proto.common;

option java_multiple_files = true;
option java_package = "com.unityonline.gameserver.proto.common";
option java_outer_classname = "CommonResponseProto";

message CommonResponse {
  int32 code = 1;
  string message = 2;
  int64 timestamp = 3;
}

message EmptyRequest {
}

message EmptyResponse {
  CommonResponse result = 1;
}
